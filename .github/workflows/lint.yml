#What is the goal of workflow
#Goal Whenever someone change the python code , the liner will check if the syntax is correct or not 

name: Auto linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest

    #this step will automatically clone the code for the current branch into the runner
    steps:
      - name: Checkout/Clone the code
        uses: actions/checkout@v7
#this steps will install the linter

      - name: Install Linter
        run: pip install ruff
#this step will run the linter
      - name: check the files for linting
        run: ruff check .
        
        
        
